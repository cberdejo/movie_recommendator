services:
  frontend:
    build:
      context: ./
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
        VITE_WS_URL: ${VITE_WS_URL:-}
    container_name: frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    env_file:
      - ./.env

  backend:
    build:
      context: ./
      dockerfile: backend/Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-movies_collection}
      DATABASE_URI: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chatdb}
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    working_dir: /app
    command: ["python",  "-m", "app.main"]
    env_file:
      - ./.env

  qdrant-init:
    build:
      context: ./
      dockerfile: backend/Dockerfile
    container_name: qdrant-init
    environment:
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-movies_collection}
    depends_on:
      - qdrant
    working_dir: /app
    command: ["python", "-m", "app.etl.populate_qdrant_movies"]
    profiles:
      - init
    env_file:
      - ./.env
  
  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-chatdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    ports:
      - "4000:4000"
    volumes:
      - ./backend/litellm_config.yaml:/app/config.yaml 
    command: [ "--config", "/app/config.yaml", "--detailed_debug" ]
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_storage:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  qdrant_data:
  postgres_data:
  ollama_storage: